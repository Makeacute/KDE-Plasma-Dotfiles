; =======================================================
; FILE: mytheme (Pywal Integrated Theme)
; =======================================================

; --- 1. PYWAL COLORS ---
; Polybar reads colors from Xresources (xrdb) generated by Pywal.
[colors]
background = #0f0d0b
foreground = ${xrdb:color7}
accent     = ${xrdb:color4}
success    = ${xrdb:color2}
warning    = ${xrdb:color3}
alert      = ${xrdb:color1}
; Dimmed foreground for icons (less bright than text)
foreground-dim = ${xrdb:color8}
; Additional dimmed color for unfocused elements
foreground-unfocused = ${xrdb:color8}

; --- 2. BAR SETUP ---
[bar/pywaltheme]
monitor = ${env:MONITOR:}
width = 100%
height = 24
offset-x = 0
offset-y = 0
background = ${colors.background}
foreground = ${colors.foreground}
module-margin = 1
padding-left = 1
padding-right = 1

; --- FONT SETUP ---
; Font 0: Main text font
font-0 = "FiraCode Nerd Font:style=Regular:pixelsize=11;3"

; Font 1: Nerd Font Symbols (contains FontAwesome glyphs)
font-1 = "Symbols Nerd Font Mono:size=12;3"

; Font 2: FiraCode Nerd Font for backup icons
font-2 = "FiraCode Nerd Font:style=Regular:pixelsize=13;3"

; Font 3: Material Icons (kept for compatibility)
font-3 = "Material Icons:size=10;3"

; Font 4: JetBrains Mono Nerd Font (kept for compatibility)
font-4 = "JetBrains Mono Nerd Font:size=10;3"

; --- MODULE LAYOUT ---
modules-left = i3
modules-center = date
modules-right = cpu memory network battery wlogout

; --- 3. MODULE DEFINITIONS ---

[module/i3]
type = internal/i3
format = <label-state> <label-mode>
index-sort = true
pin-workspaces = true

label-focused = %index%  |
label-focused-foreground = ${colors.foreground}
label-focused-padding = 1

label-unfocused = %index%  |
label-unfocused-foreground = ${colors.foreground-unfocused}
label-unfocused-padding = 1

label-visible = %index%
label-visible-foreground = ${colors.foreground}
label-visible-padding = 1

label-urgent = %index%
label-urgent-foreground = ${colors.foreground}
label-urgent-background = ${colors.alert}
label-urgent-padding = 2

; --- CPU Module ---
[module/cpu]
type = internal/cpu
interval = 0.5
; CPU icon using Nerd Font glyph
format-prefix = " "
format-prefix-foreground = ${colors.foreground-dim}
format = <label>
label = %percentage%% |
label-foreground = ${colors.foreground}

; --- Memory Module ---
[module/memory]
type = internal/memory
interval = 3
; RAM icon using Nerd Font glyph
format-prefix = " "
format-prefix-foreground = ${colors.foreground-dim}
label = %percentage_used%% |
label-foreground = ${colors.foreground}

; --- Date/Time Module ---
[module/date]
type = internal/date
interval = 1
time = %H:%M
date = %Y-%m-%d
format = <label>
label =  %date% |  %time%
label-foreground = ${colors.foreground}

; --- NETWORK MODULE (INTERACTIVE WITH NETWORKMANAGER) ---
[module/network]
type = internal/network
interface = wlan0

interval = 3.0
accumulate-stats = true
unknown-as-up = true

; Format for connected state
format-connected = <ramp-signal> <label-connected>
label-connected = %essid% |
label-connected-foreground = ${colors.foreground}

; Format for disconnected state
format-disconnected = <label-disconnected>
label-disconnected = 󰖪 Disconnected |
label-disconnected-foreground = ${colors.foreground-dim}

; Signal strength icons using Nerd Font glyphs
ramp-signal-0 = 󰤯
ramp-signal-1 = 󰤟
ramp-signal-2 = 󰤢
ramp-signal-3 = 󰤥
ramp-signal-4 = 󰤨
ramp-signal-foreground = ${colors.foreground-dim}


; --- BATTERY MODULE ---
[module/battery]
type = internal/battery
battery = BAT1
adapter = ACAD
full-at = 100
poll-interval = 5

; Format when charging
format-charging = <animation-charging> <label-charging>
label-charging = %percentage%% |
label-charging-foreground = ${colors.foreground}

; Format when discharging
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%% |
label-discharging-foreground = ${colors.foreground}

; Format when full - shows charging icon when plugged in at 100%
format-full = <label-full>
format-full-prefix = "󰂅 "
format-full-prefix-foreground = ${colors.foreground-dim}
label-full = %percentage%% |
label-full-foreground = ${colors.foreground}

; Battery capacity icons (discharging)
ramp-capacity-0 = 󰁺
ramp-capacity-0-foreground = ${colors.alert}
ramp-capacity-1 = 󰁻
ramp-capacity-1-foreground = ${colors.warning}
ramp-capacity-2 = 󰁽
ramp-capacity-2-foreground = ${colors.foreground-dim}
ramp-capacity-3 = 󰁿
ramp-capacity-3-foreground = ${colors.foreground-dim}
ramp-capacity-4 = 󰂁
ramp-capacity-4-foreground = ${colors.foreground-dim}
ramp-capacity-5 = 󰁹
ramp-capacity-5-foreground = ${colors.foreground-dim}

; Charging animation - includes full battery charging icon as fifth frame
animation-charging-0 = 󰢟
animation-charging-1 = 󰂆
animation-charging-2 = 󰢝
animation-charging-3 = 󰂅
animation-charging-foreground = ${colors.foreground-dim}
animation-charging-framerate = 750

; Low battery warning
format-low = <label-low>
format-low-prefix = "󰂃 "
format-low-prefix-foreground = ${colors.alert}
label-low = %percentage%% |
label-low-foreground = ${colors.alert}

; --- WLOGOUT MODULE (POWER MENU) ---
[module/wlogout]
type = custom/text
content = "⏻  "
content-foreground = ${colors.foreground-dim}
content-padding = 0.5
click-left = wlogout &
